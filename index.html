<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroZero | High-Performance No-Code Builder</title>
    <meta name="description" content="Build stunning, professional websites in minutes with AeroZero's high-performance no-code interface. Designed for business growth.">
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div id="app-container">
        <!-- Top Navigation -->
        <header class="top-bar">
            <div class="logo">
                <span class="logo-icon"><i class="fas fa-bolt"></i></span>
                <h1>Aero<span>Zero</span></h1>
            </div>
            <div class="view-controls">
                <button class="view-btn active" data-view="desktop" title="Desktop View"><i class="fas fa-desktop"></i></button>
                <button class="view-btn" data-view="tablet" title="Tablet View"><i class="fas fa-tablet-alt"></i></button>
                <button class="view-btn" data-view="mobile" title="Mobile View"><i class="fas fa-mobile-alt"></i></button>
            </div>
            <div class="action-buttons">
                <button id="preview-btn" class="secondary-btn"><i class="fas fa-eye"></i> Preview</button>
                <button id="export-btn" class="primary-btn"><i class="fas fa-cloud-arrow-down"></i> Launch</button>
            </div>
        </header>

        <main class="editor-layout">
            <!-- Left Sidebar: Component Library -->
            <aside class="sidebar components-panel">
                <div class="panel-header">
                    <h3>Blocks</h3>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search components...">
                    </div>
                </div>
                <div class="component-groups">
                    <div class="group">
                        <span class="group-title">Layout</span>
                        <div class="component-list">
                            <div class="block-item" data-type="hero" draggable="true">
                                <i class="fas fa-images"></i>
                                <span>Hero Section</span>
                            </div>
                            <div class="block-item" data-type="features" draggable="true">
                                <i class="fas fa-layer-group"></i>
                                <span>Features</span>
                            </div>
                            <div class="block-item" data-type="services" draggable="true">
                                <i class="fas fa-concierge-bell"></i>
                                <span>Services</span>
                            </div>
                        </div>
                    </div>
                    <div class="group">
                        <span class="group-title">Content</span>
                        <div class="component-list">
                            <div class="block-item" data-type="text-image" draggable="true">
                                <i class="fas fa-columns"></i>
                                <span>Text & Image</span>
                            </div>
                            <div class="block-item" data-type="testimonials" draggable="true">
                                <i class="fas fa-quote-left"></i>
                                <span>Testimonials</span>
                            </div>
                        </div>
                    </div>
                    <div class="group">
                        <span class="group-title">Forms</span>
                        <div class="component-list">
                            <div class="block-item" data-type="contact" draggable="true">
                                <i class="fas fa-envelope"></i>
                                <span>Contact Form</span>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Canvas -->
            <section class="canvas-wrapper">
                <div id="canvas" class="canvas desktop-view">
                    <!-- Drop Zone -->
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-plus"></i></div>
                        <h2>Create your masterpiece</h2>
                        <p>Drag components from the library or click to add blocks</p>
                    </div>
                </div>
            </section>

            <!-- Right Sidebar: Configuration -->
            <aside class="sidebar config-panel">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="style">Style</button>
                    <button class="tab-btn" data-tab="settings">Settings</button>
                </div>
                
                <div class="tab-content" id="style-tab">
                    <div class="config-group">
                        <h4>Global Colors</h4>
                        <div class="color-presets">
                            <button class="color-swatch active" style="background: linear-gradient(135deg, #6366f1, #a855f7);" data-primary="#6366f1" data-accent="#a855f7"></button>
                            <button class="color-swatch" style="background: linear-gradient(135deg, #06b6d4, #3b82f6);" data-primary="#06b6d4" data-accent="#3b82f6"></button>
                            <button class="color-swatch" style="background: linear-gradient(135deg, #10b981, #3b82f6);" data-primary="#10b981" data-accent="#3b82f6"></button>
                            <button class="color-swatch" style="background: linear-gradient(135deg, #f43f5e, #fb923c);" data-primary="#f43f5e" data-accent="#fb923c"></button>
                        </div>
                    </div>
                    
                    <div class="config-group">
                        <h4>Typography</h4>
                        <select id="font-select" class="select-input">
                            <option value="'Outfit', sans-serif">Modern (Outfit)</option>
                            <option value="'Inter', sans-serif">Technical (Inter)</option>
                            <option value="system-ui, sans-serif">System Sans</option>
                        </select>
                    </div>

                    <div id="element-styles" class="hidden">
                        <hr>
                        <h4>Element Styles</h4>
                        <div class="style-field">
                            <label>Padding (px)</label>
                            <input type="range" min="0" max="200" value="80" id="block-padding">
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Preview Overlay -->
        <div id="preview-modal" class="modal">
            <div class="modal-content">
                <nav class="preview-nav">
                    <button id="close-preview"><i class="fas fa-chevron-left"></i> Back to Editor</button>
                    <div class="preview-status">Live Preview Mode</div>
                </nav>
                <div id="preview-frame"></div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="app.js"></script>
</body>
</html>
